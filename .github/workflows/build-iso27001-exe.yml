name: Build ISO27001 Endpoint Assessment Tool (Windows .exe)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller openpyxl

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --name ISO27001_Endpoint_Assessment ^
            --add-data "iso27001_endpoint_check.py;." ^
            --console ^
            --clean ^
            iso27001_endpoint_check.py

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISO27001_Endpoint_Assessment_EXE
          path: dist/ISO27001_Endpoint_Assessment.exe
          retention-days: 14

      - name: Download artifact (run workflow)
        run: |
          echo "Build complete! Download the .exe from the Artifacts section above."
          echo "The .exe will be in dist/ISO27001_Endpoint_Assessment.exe"
