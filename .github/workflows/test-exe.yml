name: Test EXE on Windows

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Download the .exe
        shell: powershell
        run: |
          $exeUrl = "https://github.com/mominaali675-commits/iso27001-endpoint-tool/releases/download/v1.0/ISO27001_Endpoint_Assessment_GUI.exe"
          $exeName = "ISO27001_Endpoint_Assessment.exe"
          Write-Host "Downloading..."
          # Use curl.exe (not PowerShell alias) with -L for redirects
          C:\Windows\System32\curl.exe -L -o "$env:TEMP\$exeName" "$exeUrl"
          $size = (Get-Item "$env:TEMP\$exeName").Length
          Write-Host "Downloaded: $([math]::Round($size/1MB, 1)) MB"

      - name: Run exe and capture full output
        id: run
        shell: powershell
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $exePath = "$env:TEMP\ISO27001_Endpoint_Assessment.exe"
          $start = Get-Date
          Write-Host "=== Running EXE at $start ==="
          
          $proc = Start-Process -FilePath $exePath -NoNewWindow -Wait -PassThru
          $exitCode = $proc.ExitCode
          $duration = (Get-Date) - $start
          
          Write-Host "=== RESULT ==="
          Write-Host "Exit Code: $exitCode"
          Write-Host "Duration: $($duration.TotalSeconds) seconds"

          $desktopPath = [Environment]::GetFolderPath('Desktop')
          Write-Host "=== Desktop files ==="
          Get-ChildItem $desktopPath -File | Sort-Object LastWriteTime -Descending | Select-Object -First 15 Name, Length, LastWriteTime

          $xlsxFiles = Get-ChildItem $desktopPath -Filter "*.xlsx" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending
          if ($xlsxFiles) {
            Write-Host "=== EXCEL FILES FOUND: $($xlsxFiles.Count} ==="
            $xlsxFiles | Format-Table Name, Length, LastWriteTime -AutoSize
          } else {
            Write-Host "NO .xlsx files on Desktop"
          }
          
          Write-Host "=== APPDATA ==="
          $appdataPath = $env:APPDATA
          Write-Host "AppData: $appdataPath"
          Get-ChildItem $appdataPath -ErrorAction SilentlyContinue | Select-Object -First 15 Name
          
          Write-Host "=== LOCALAPPDATA ==="
          $localAppData = $env:LOCALAPPDATA
          Write-Host "LocalAppData: $localAppData"
          Get-ChildItem $localAppData -ErrorAction SilentlyContinue | Select-Object -First 10 Name

      - name: Deep diagnostic
        if: always()
        shell: powershell
        run: |
          $desktopPath = [Environment]::GetFolderPath('Desktop')
          Write-Host "=== ALL DESKTOP FILES ==="
          Get-ChildItem $desktopPath -File | Sort-Object LastWriteTime -Descending | Format-Table Name, Length, LastWriteTime -AutoSize
          
          Write-Host "=== CHECK PYINSTALLER TEMP DIR ==="
          $tempXlsx = Get-ChildItem $env:TEMP -Filter "*.xlsx" -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 5 FullName
          if ($tempXlsx) { $tempXlsx | Format-Table FullName, Length -AutoSize }
          else { Write-Host "No xlsx in TEMP" }
