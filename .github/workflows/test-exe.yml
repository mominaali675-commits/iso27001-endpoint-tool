name: Test EXE on Windows

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Download the .exe
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $exeUrl = "https://github.com/mominaali675-commits/iso27001-endpoint-tool/releases/download/v1.0/ISO27001_Endpoint_Assessment_GUI.exe"
          $exeName = "ISO27001_Endpoint_Assessment.exe"
          Write-Host "Downloading from: $exeUrl"
          curl -L -o "$env:TEMP\$exeName" "$exeUrl"
          $size = (Get-Item "$env:TEMP\$exeName").Length
          Write-Host "Downloaded: $($size / 1MB) MB"

      - name: Run exe with timeout and full capture
        id: run
        shell: powershell
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $exePath = "$env:TEMP\ISO27001_Endpoint_Assessment.exe"
          $start = Get-Date
          Write-Host "=== Running EXE ==="
          Write-Host "Start time: $start"
          
          $proc = Start-Process -FilePath $exePath -NoNewWindow -Wait -PassThru
          $exitCode = $proc.ExitCode
          $duration = (Get-Date) - $start
          
          Write-Host "=== RESULT ==="
          Write-Host "Exit Code: $exitCode"
          Write-Host "Duration: $($duration.TotalSeconds) seconds"

          $desktopPath = [Environment]::GetFolderPath('Desktop')
          Write-Host "=== Desktop files after run ==="
          Get-ChildItem $desktopPath -File | Sort-Object LastWriteTime -Descending | Select-Object -First 10 Name, Length, LastWriteTime

          # Check for xlsx files
          $xlsxFiles = Get-ChildItem $desktopPath -Filter "*.xlsx" -ErrorAction SilentlyContinue
          if ($xlsxFiles) {
            Write-Host "=== EXCEL FILES FOUND ==="
            $xlsxFiles | Sort-Object LastWriteTime -Descending | Format-Table Name, Length, LastWriteTime -AutoSize
            Write-Host "Most recent: $($xlsxFiles[0].FullName)"
          } else {
            Write-Host "No .xlsx files found on Desktop"
          }
          
          # Write exit code
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Full workspace diagnostic
        if: always()
        shell: powershell
        run: |
          Write-Host "=== RECENT DESKTOP FILES ==="
          $desktopPath = [Environment]::GetFolderPath('Desktop')
          Get-ChildItem $desktopPath -File | Sort-Object LastWriteTime -Descending | Select-Object -First 20 Name, Length, LastWriteTime
          
          Write-Host "=== TEMP FILES (recent .xlsx) ==="
          Get-ChildItem $env:TEMP -Filter "*.xlsx" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 5 Name, Length, FullName
          
          Write-Host "=== USERPROFILE ==="
          Write-Host $env:USERPROFILE
          Get-ChildItem $env:USERPROFILE -ErrorAction SilentlyContinue | Select-Object -First 10 Name
